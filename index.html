<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#4361ee" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="description" content="Sudoku — a beautiful puzzle game with tips, tricks, and four difficulty levels. Works offline." />
  <title>Sudoku</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon.svg" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">

    <!-- ── Header ── -->
    <header class="header">
      <h1 class="logo">Sudoku</h1>
      <div class="stats">
        <div class="stat">
          <span class="stat-label">Mistakes</span>
          <span class="stat-value" id="mistakes-display">0 / 3</span>
        </div>
        <div class="stat">
          <span class="stat-label">Time</span>
          <span class="stat-value mono" id="timer-display">00:00</span>
        </div>
      </div>
    </header>

    <!-- ── Difficulty ── -->
    <nav class="difficulty-bar" aria-label="Difficulty selection">
      <button class="diff-btn is-active" data-diff="easy">Easy</button>
      <button class="diff-btn" data-diff="medium">Medium</button>
      <button class="diff-btn" data-diff="hard">Hard</button>
      <button class="diff-btn" data-diff="expert">Expert</button>
    </nav>

    <!-- ── Board ── -->
    <main class="board-wrap" aria-label="Sudoku board">
      <div class="board-frame">
        <div class="board" id="board" role="grid"></div>
      </div>
    </main>

    <!-- ── Controls ── -->
    <div class="controls" role="toolbar" aria-label="Game controls">
      <button class="ctrl-btn" id="btn-undo" title="Undo (Ctrl+Z)" aria-label="Undo last move">
        <svg class="ctrl-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3 7v6h6"/><path d="M3 13C5.3 8.4 9.8 5 15 5c5.5 0 10 4.5 10 10s-4.5 10-10 10c-3 0-5.7-1.3-7.6-3.4"/>
        </svg>
        <span>Undo</span>
      </button>
      <button class="ctrl-btn" id="btn-erase" title="Erase (Del)" aria-label="Erase selected cell">
        <svg class="ctrl-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M20 20H7L3 16l11-11 7 7-1.5 1.5"/><path d="M6.5 17.5l1-1"/>
        </svg>
        <span>Erase</span>
      </button>
      <button class="ctrl-btn" id="btn-notes" title="Toggle notes (N)" aria-label="Toggle note mode" aria-pressed="false">
        <svg class="ctrl-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
        <span>Notes</span>
      </button>
      <button class="ctrl-btn" id="btn-hint" title="Hint (H)" aria-label="Get a hint">
        <svg class="ctrl-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="10"/>
          <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
          <line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
        <span>Hint</span>
      </button>
    </div>

    <!-- ── Number Pad ── -->
    <div class="numpad" id="numpad" role="toolbar" aria-label="Number input"></div>

    <!-- ── New Game ── -->
    <div class="new-game-row">
      <button class="btn-new" id="btn-new-game">New Game</button>
    </div>

    <!-- ── Tips & Tricks ── -->
    <section class="tips-section" aria-label="Tips and tricks">
      <button class="tips-header" id="tips-toggle" aria-expanded="false" aria-controls="tips-body">
        <span class="tips-title">Tips &amp; Tricks</span>
        <svg class="tips-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>
      <div class="tips-body" id="tips-body" hidden>
        <p class="tips-intro">Master these techniques to solve any puzzle — from first-timer to grandmaster.</p>
        <div id="tips-list"></div>
      </div>
    </section>

  </div><!-- /.app -->

  <!-- ── Win Modal ── -->
  <div class="modal-overlay" id="win-overlay" hidden role="dialog" aria-modal="true" aria-labelledby="win-title">
    <div class="modal">
      <div class="modal-icon" aria-hidden="true">🎉</div>
      <h2 class="modal-title" id="win-title">Puzzle Complete!</h2>
      <p class="modal-meta">Difficulty: <strong id="win-diff"></strong></p>
      <p class="modal-meta">Time: <strong id="win-time" class="mono"></strong></p>
      <p class="modal-meta">Mistakes: <strong id="win-mistakes"></strong></p>
      <div class="modal-actions">
        <button class="btn-new" id="btn-play-again">Play Again</button>
      </div>
    </div>
  </div>

  <!-- ── Game Over Modal ── -->
  <div class="modal-overlay" id="gameover-overlay" hidden role="dialog" aria-modal="true" aria-labelledby="gameover-title">
    <div class="modal">
      <div class="modal-icon" aria-hidden="true">😔</div>
      <h2 class="modal-title" id="gameover-title">Too Many Mistakes</h2>
      <p class="modal-sub">Don't worry — every puzzle makes you sharper.</p>
      <div class="modal-actions">
        <button class="btn-new" id="btn-retry">Try Again</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
