<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#4361ee"/>

  <!-- 3×3 macro grid (white lines) -->
  <!-- Vertical dividers -->
  <line x1="176" y1="64" x2="176" y2="448" stroke="white" stroke-width="6" stroke-opacity="0.6"/>
  <line x1="336" y1="64" x2="336" y2="448" stroke="white" stroke-width="6" stroke-opacity="0.6"/>
  <!-- Horizontal dividers -->
  <line x1="64" y1="176" x2="448" y2="176" stroke="white" stroke-width="6" stroke-opacity="0.6"/>
  <line x1="64" y1="336" x2="448" y2="336" stroke="white" stroke-width="6" stroke-opacity="0.6"/>

  <!-- Outer border -->
  <rect x="64" y="64" width="384" height="384" rx="16" fill="none" stroke="white" stroke-width="10"/>

  <!-- Sample digits — give the icon life -->
  <!-- Row 1 -->
  <text x="120" y="154" text-anchor="middle" font-family="system-ui,sans-serif" font-size="80" font-weight="700" fill="white" opacity="0.95">4</text>
  <text x="256" y="154" text-anchor="middle" font-family="system-ui,sans-serif" font-size="80" font-weight="700" fill="white" opacity="0.55">·</text>
  <text x="392" y="154" text-anchor="middle" font-family="system-ui,sans-serif" font-size="80" font-weight="700" fill="white" opacity="0.95">7</text>

  <!-- Row 2 -->
  <text x="120" y="314" text-anchor="middle" font-family="system-ui,sans-serif" font-size="80" font-weight="700" fill="white" opacity="0.55">·</text>
  <text x="256" y="314" text-anchor="middle" font-family="system-ui,sans-serif" font-size="80" font-weight="700" fill="white" opacity="0.95">9</text>
  <text x="392" y="314" text-anchor="middle" font-family="system-ui,sans-serif" font-size="80" font-weight="700" fill="white" opacity="0.55">·</text>

  <!-- Row 3 -->
  <text x="120" y="436" text-anchor="middle" font-family="system-ui,sans-serif" font-size="80" font-weight="700" fill="white" opacity="0.95">2</text>
  <text x="256" y="436" text-anchor="middle" font-family="system-ui,sans-serif" font-size="80" font-weight="700" fill="white" opacity="0.55">·</text>
  <text x="392" y="436" text-anchor="middle" font-family="system-ui,sans-serif" font-size="80" font-weight="700" fill="white" opacity="0.95">5</text>
</svg>
